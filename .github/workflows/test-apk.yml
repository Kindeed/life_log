# ============================================================
# LifeLog - Manual Test APK
# ============================================================
# Trigger: manually from GitHub Actions.
# Output: APK artifact for testing, no GitHub Release is created.
# ============================================================

name: Build Test APK

on:
  workflow_dispatch:
    inputs:
      build_mode:
        description: "APK build mode"
        required: true
        default: "debug"
        type: choice
        options:
          - debug
          - profile
          - release

permissions:
  contents: read

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
  PUB_HOSTED_URL: https://pub.flutter-io.cn
  FLUTTER_STORAGE_BASE_URL: https://storage.flutter-io.cn

concurrency:
  group: test-apk-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    name: Build ${{ inputs.build_mode }} APK
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Validate Supabase secrets
        run: |
          test -n "${{ secrets.SUPABASE_URL }}" || (echo "Missing SUPABASE_URL secret" && exit 1)
          test -n "${{ secrets.SUPABASE_ANON_KEY }}" || (echo "Missing SUPABASE_ANON_KEY secret" && exit 1)

      - name: Validate release signing secrets
        if: ${{ inputs.build_mode == 'release' }}
        run: |
          test -n "${{ secrets.KEYSTORE_BASE64 }}" || (echo "Missing KEYSTORE_BASE64 secret" && exit 1)
          test -n "${{ secrets.STORE_PASSWORD }}" || (echo "Missing STORE_PASSWORD secret" && exit 1)
          test -n "${{ secrets.KEY_PASSWORD }}" || (echo "Missing KEY_PASSWORD secret" && exit 1)
          test -n "${{ secrets.KEY_ALIAS }}" || (echo "Missing KEY_ALIAS secret" && exit 1)

      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: "temurin"
          java-version: "17"
          cache: "gradle"

      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: "3.38.5"
          channel: "stable"
          cache: true

      - name: Install dependencies
        run: flutter pub get --enforce-lockfile

      - name: Run build_runner
        run: dart run build_runner build --delete-conflicting-outputs

      - name: Decode release keystore
        if: ${{ inputs.build_mode == 'release' }}
        run: |
          echo "${{ secrets.KEYSTORE_BASE64 }}" | tr -d '\n ' | base64 --decode > android/app/upload-keystore.jks

      - name: Create release key.properties
        if: ${{ inputs.build_mode == 'release' }}
        run: |
          cat > android/key.properties << EOF
          storePassword=${{ secrets.STORE_PASSWORD }}
          keyPassword=${{ secrets.KEY_PASSWORD }}
          keyAlias=${{ secrets.KEY_ALIAS }}
          storeFile=upload-keystore.jks
          EOF

      - name: Check formatting
        run: dart format --set-exit-if-changed .

      - name: Analyze code
        run: flutter analyze --fatal-infos --fatal-warnings

      - name: Run tests
        run: flutter test

      - name: Build debug APK
        if: ${{ inputs.build_mode == 'debug' }}
        run: >
          flutter build apk --debug
          --dart-define=SUPABASE_URL=${{ secrets.SUPABASE_URL }}
          --dart-define=SUPABASE_ANON_KEY=${{ secrets.SUPABASE_ANON_KEY }}

      - name: Build profile APK
        if: ${{ inputs.build_mode == 'profile' }}
        run: >
          flutter build apk --profile
          --dart-define=SUPABASE_URL=${{ secrets.SUPABASE_URL }}
          --dart-define=SUPABASE_ANON_KEY=${{ secrets.SUPABASE_ANON_KEY }}

      - name: Build release APK
        if: ${{ inputs.build_mode == 'release' }}
        run: >
          flutter build apk --release
          --dart-define=SUPABASE_URL=${{ secrets.SUPABASE_URL }}
          --dart-define=SUPABASE_ANON_KEY=${{ secrets.SUPABASE_ANON_KEY }}

      - name: Rename APK file
        run: |
          for apk in build/app/outputs/flutter-apk/app-*.apk; do
            mv "$apk" "$(dirname "$apk")/lifelog-${apk##*app-}"
          done

      - name: Generate APK size report
        run: >
          dart run tool/apk_size_report.dart
          build/app/outputs/flutter-apk
          build/app/outputs/flutter-apk/lifelog-apk-size-report.md
          --max-mb=250

      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: lifelog-${{ inputs.build_mode }}-apk-${{ github.run_number }}
          path: |
            build/app/outputs/flutter-apk/*.apk
            build/app/outputs/flutter-apk/lifelog-apk-size-report.md
          if-no-files-found: error
          retention-days: 14
