# ============================================================
# LifeLog - Main CI Test APK
# ============================================================
# Trigger: push to main or manual dispatch.
# Output: debug APK artifact for post-merge verification.
# ============================================================

name: Main CI Test APK

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
  PUB_HOSTED_URL: https://pub.flutter-io.cn
  FLUTTER_STORAGE_BASE_URL: https://storage.flutter-io.cn

concurrency:
  group: main-ci-apk-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    name: Build main debug APK
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Validate Supabase secrets
        run: |
          test -n "${{ secrets.SUPABASE_URL }}" || (echo "Missing SUPABASE_URL secret" && exit 1)
          test -n "${{ secrets.SUPABASE_ANON_KEY }}" || (echo "Missing SUPABASE_ANON_KEY secret" && exit 1)

      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: "temurin"
          java-version: "17"
          cache: "gradle"

      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: "3.38.5"
          channel: "stable"
          cache: true

      - name: Install dependencies
        run: flutter pub get --enforce-lockfile

      - name: Run build_runner
        run: dart run build_runner build --delete-conflicting-outputs

      - name: Check formatting
        run: dart format --set-exit-if-changed .

      - name: Analyze code
        run: flutter analyze --fatal-infos --fatal-warnings

      - name: Run tests
        run: flutter test

      - name: Build debug APK
        run: >
          flutter build apk --debug
          --dart-define=SUPABASE_URL=${{ secrets.SUPABASE_URL }}
          --dart-define=SUPABASE_ANON_KEY=${{ secrets.SUPABASE_ANON_KEY }}

      - name: Rename APK file
        run: |
          mv build/app/outputs/flutter-apk/app-debug.apk build/app/outputs/flutter-apk/lifelog-main-debug.apk

      - name: Generate APK size report
        run: >
          dart run tool/apk_size_report.dart
          build/app/outputs/flutter-apk
          build/app/outputs/flutter-apk/lifelog-apk-size-report.md
          --max-mb=250

      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: lifelog-main-debug-apk-${{ github.run_number }}
          path: |
            build/app/outputs/flutter-apk/*.apk
            build/app/outputs/flutter-apk/lifelog-apk-size-report.md
          if-no-files-found: error
          retention-days: 14
